# Redisx 单机 / 集群配置（模式 C：6 组合由 env var 切换）
# 测试启动前由 e2e_test.go 设：
#   MQ_TRACE_BACKEND = jaeger|redis_stream|kafka_topic
#   MQ_TOPOLOGY      = single|cluster
#   REDIS_ADDR       = localhost:6379 (single) / 6 节点 cluster
#   TRACE_KAFKA_BROKERS = localhost:9092
#   TRACE_REDIS_STREAM  = trace:redisx:${MQ_TOPOLOGY:-single}
redis_single:
  driver: redis
  mode: single
  addrs:
    - ${env:REDIS_ADDR:-localhost:6379}
  auth:
    password: ${env:REDIS_PASSWORD:-redis123456}
  metrics:
    enabled: true
  producer:
    topic: example-stream
  consumer:
    topics: [example-stream]
    group: example-group
  redis:
    db: 0
    pool_size: 20
    max_len: 1000
  trace:
    enabled: true
    service_name: redisx-test
    exporter: ${env:MQ_TRACE_BACKEND:-jaeger}
    endpoint: ${env:JAEGER_ENDPOINT:-localhost:4317}
    protocol: grpc
    sampler_type: always_on
    sampler_ratio: 1.0
    # 当 exporter=redis_stream 时，下游 InitTracing 会用 TRACE_REDIS_STREAM 作为 stream 名
    stream: ${env:TRACE_REDIS_STREAM:-trace:redisx:single}
    # 当 exporter=kafka_topic 时，trace exporter 写到 trace-spans-redisx
    topic: ${env:TRACE_KAFKA_TOPIC:-trace-spans-redisx}

redis_cluster:
  driver: redis
  mode: cluster
  addrs:
    - ${env:REDIS_CLUSTER_ADDR_1:-10.0.0.1:6379}
    - ${env:REDIS_CLUSTER_ADDR_2:-10.0.0.2:6379}
    - ${env:REDIS_CLUSTER_ADDR_3:-10.0.0.3:6379}
  auth:
    username: ${env:REDIS_USERNAME:-default}
    password: ${env:REDIS_PASSWORD:-pwd}
  metrics:
    enabled: true
  producer:
    topic: example-stream
  consumer:
    topics: [example-stream]
    group: example-cluster-group
  redis:
    pool_size: 100
  trace:
    enabled: true
    service_name: redisx-test-cluster
    exporter: ${env:MQ_TRACE_BACKEND:-jaeger}
    endpoint: ${env:JAEGER_ENDPOINT:-localhost:4317}
    protocol: grpc
    sampler_type: always_on
    sampler_ratio: 1.0
    stream: ${env:TRACE_REDIS_STREAM:-trace:redisx:cluster}
    topic: ${env:TRACE_KAFKA_TOPIC:-trace-spans-redisx}
