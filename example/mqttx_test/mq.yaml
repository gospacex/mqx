mqtt_single:
  driver: mqtt
  mode: single
  addrs:
    - ${env:MQTT_BROKER:-tcp://localhost:1883}
  metrics: { enabled: true }
  producer:
    topic: example/mqtt
  consumer:
    topics: [example/mqtt]
    group: example-group
  mqtt:
    client_id: mqttx-test-publisher
    keep_alive: 30s
    connect_timeout: 5s
  trace:
    enabled: true
    service_name: mqttx-test
    exporter: ${env:MQ_TRACE_BACKEND:-jaeger}
    endpoint: ${env:JAEGER_ENDPOINT:-localhost:4317}
    protocol: grpc
    sampler_type: always_on
    sampler_ratio: 1.0
    stream: ${env:TRACE_REDIS_STREAM:-trace:mqttx:single}
    topic: ${env:TRACE_KAFKA_TOPIC:-trace-spans-mqttx}

mqtt_cluster:
  driver: mqtt
  mode: cluster
  addrs:
    - ${env:MQTT_BROKER_1:-tcp://localhost:1883}
    - ${env:MQTT_BROKER_2:-tcp://localhost:1884}
    - ${env:MQTT_BROKER_3:-tcp://localhost:1885}
  metrics: { enabled: true }
  producer:
    topic: example/mqtt
  consumer:
    topics: [example/mqtt]
    group: example-cluster-group
  mqtt:
    client_id: mqttx-test-cluster-publisher
    keep_alive: 30s
  trace:
    enabled: true
    service_name: mqttx-test-cluster
    exporter: ${env:MQ_TRACE_BACKEND:-jaeger}
    endpoint: ${env:JAEGER_ENDPOINT:-localhost:4317}
    protocol: grpc
    sampler_type: always_on
    sampler_ratio: 1.0
    stream: ${env:TRACE_REDIS_STREAM:-trace:mqttx:cluster}
    topic: ${env:TRACE_KAFKA_TOPIC:-trace-spans-mqttx}
