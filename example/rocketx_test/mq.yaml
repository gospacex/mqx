rocketmq_single:
  driver: rocketmq
  mode: single
  addrs:
    - ${env:ROCKETMQ_NAMESRV:-localhost:9876}
  metrics: { enabled: true }
  producer:
    topic: example-rocket
  consumer:
    topics: [example-rocket]
    group: example-group
  rocketmq:
    name_server: [${env:ROCKETMQ_NAMESRV:-localhost:9876}]
    group_name: example-group
    send_timeout: 5s
    consume_from_where: CONSUME_FROM_FIRST_OFFSET
  trace:
    enabled: true
    service_name: rocketx-test
    exporter: ${env:MQ_TRACE_BACKEND:-jaeger}
    endpoint: ${env:JAEGER_ENDPOINT:-localhost:4317}
    protocol: grpc
    sampler_type: always_on
    sampler_ratio: 1.0
    stream: ${env:TRACE_REDIS_STREAM:-trace:rocketx:single}
    topic: ${env:TRACE_KAFKA_TOPIC:-trace-spans-rocketx}

rocketmq_cluster:
  driver: rocketmq
  mode: cluster
  addrs:
    - ${env:ROCKETMQ_NAMESRV_1:-localhost:9876}
    - ${env:ROCKETMQ_NAMESRV_2:-localhost:9877}
  metrics: { enabled: true }
  producer:
    topic: example-rocket
  consumer:
    topics: [example-rocket]
    group: example-cluster-group
  rocketmq:
    name_server: [${env:ROCKETMQ_NAMESRV_1:-localhost:9876}, ${env:ROCKETMQ_NAMESRV_2:-localhost:9877}]
    group_name: example-cluster-group
    send_timeout: 5s
    consume_from_where: CONSUME_FROM_FIRST_OFFSET
  trace:
    enabled: true
    service_name: rocketx-test-cluster
    exporter: ${env:MQ_TRACE_BACKEND:-jaeger}
    endpoint: ${env:JAEGER_ENDPOINT:-localhost:4317}
    protocol: grpc
    sampler_type: always_on
    sampler_ratio: 1.0
    stream: ${env:TRACE_REDIS_STREAM:-trace:rocketx:cluster}
    topic: ${env:TRACE_KAFKA_TOPIC:-trace-spans-rocketx}