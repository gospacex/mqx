# Kafkax 单机 / 集群配置（模式 C：6 组合由 env var 切换）
# 测试启动前由 e2e_test.go 设：
#   MQ_TRACE_BACKEND = jaeger|redis_stream|kafka_topic
#   MQ_TOPOLOGY      = single|cluster
#   KAFKA_BROKER     = localhost:9092
#   TRACE_KAFKA_BROKERS = localhost:9092
kafka_single:
  driver: kafka
  mode: single
  addrs:
    - ${env:KAFKA_BROKER:-localhost:9092}
  producer:
    topic: example-events
    acks: all
  consumer:
    topics: [example-events]
    group: example-group
  trace:
    enabled: true
    service_name: kafkax-test
    exporter: ${env:MQ_TRACE_BACKEND:-jaeger}
    endpoint: ${env:JAEGER_ENDPOINT:-localhost:4318}
    protocol: http
    sampler_type: always_on
    sampler_ratio: 1.0
    stream: ${env:TRACE_REDIS_STREAM:-trace:kafkax:single}
    topic: ${env:TRACE_KAFKA_TOPIC:-trace-spans-kafkax}
  metrics:
    enabled: true
    exporter: prometheus
  kafka:
    security_protocol: PLAINTEXT

kafka_cluster:
  driver: kafka
  mode: cluster
  addrs:
    - ${env:KAFKA_BROKER_1:-localhost:9092}
    - ${env:KAFKA_BROKER_2:-localhost:9093}
    - ${env:KAFKA_BROKER_3:-localhost:9094}
  producer:
    topic: prod-events
    batch_size: 5000
    linger_ms: 10
  consumer:
    group: cluster-group
    topics: [example-events]
  trace:
    enabled: true
    service_name: kafkax-test-cluster
    exporter: ${env:MQ_TRACE_BACKEND:-jaeger}
    endpoint: ${env:JAEGER_ENDPOINT:-localhost:4318}
    protocol: http
    sampler_type: always_on
    sampler_ratio: 1.0
    stream: ${env:TRACE_REDIS_STREAM:-trace:kafkax:cluster}
    topic: ${env:TRACE_KAFKA_TOPIC:-trace-spans-kafkax}
  metrics:
    enabled: true
    exporter: prometheus
  kafka:
    security_protocol: PLAINTEXT