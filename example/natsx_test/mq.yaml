# Natsx 单机 / 集群配置（模式 C：6 组合由 env var 切换）
# 测试启动前由 e2e_test.go 设：
#   MQ_TRACE_BACKEND = jaeger|redis_stream|kafka_topic
#   MQ_TOPOLOGY      = single|cluster
#   NATS_SERVER      = localhost:4222 (single)
#   NATS_SERVER_1/2/3 = localhost:4222/4223/4224 (cluster)
#   TRACE_KAFKA_BROKERS = localhost:9092
#   TRACE_REDIS_STREAM  = trace:natsx:${MQ_TOPOLOGY:-single}
nats_single:
  driver: nats
  mode: single
  addrs:
    - ${env:NATS_SERVER:-nats://localhost:4222}
  metrics: { enabled: true }
  producer:
    topic: example.subject
  consumer:
    topics: [example.subject]
    group: example-queue
  nats:
    name: natsx-test
    ping_interval: 10s
    jetstream: false
  trace:
    enabled: true
    service_name: natsx-test
    exporter: ${env:MQ_TRACE_BACKEND:-jaeger}
    endpoint: ${env:JAEGER_ENDPOINT:-localhost:4317}
    protocol: grpc
    sampler_type: always_on
    sampler_ratio: 1.0
    stream: ${env:TRACE_REDIS_STREAM:-trace:natsx:single}
    topic: ${env:TRACE_KAFKA_TOPIC:-trace-spans-natsx}

nats_cluster:
  driver: nats
  mode: cluster
  addrs:
    - ${env:NATS_SERVER_1:-nats://localhost:4222}
    - ${env:NATS_SERVER_2:-nats://localhost:4223}
    - ${env:NATS_SERVER_3:-nats://localhost:4224}
  metrics: { enabled: true }
  producer:
    topic: example.subject
  consumer:
    topics: [example.subject]
    group: example-cluster-group
  nats:
    name: natsx-test-cluster
    ping_interval: 10s
    jetstream: false
  trace:
    enabled: true
    service_name: natsx-test-cluster
    exporter: ${env:MQ_TRACE_BACKEND:-jaeger}
    endpoint: ${env:JAEGER_ENDPOINT:-localhost:4317}
    protocol: grpc
    sampler_type: always_on
    sampler_ratio: 1.0
    stream: ${env:TRACE_REDIS_STREAM:-trace:natsx:cluster}
    topic: ${env:TRACE_KAFKA_TOPIC:-trace-spans-natsx}