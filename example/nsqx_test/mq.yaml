# Nsqx 单机 / 集群配置（模式 C：6 组合由 env var 切换）
# 测试启动前由 e2e_test.go 设：
#   MQ_TRACE_BACKEND = jaeger|redis_stream|kafka_topic
#   MQ_TOPOLOGY      = single|cluster
#   NSQLOOKUPD_ADDR  = localhost:4161 (single)
#   NSQD_ADDR        = localhost:4150
#   TRACE_REDIS_STREAM  = trace:nsqx:${MQ_TOPOLOGY:-single}
#   TRACE_KAFKA_TOPIC   = trace-spans-nsqx
nsq_single:
  driver: nsq
  mode: single
  addrs:
    - ${env:NSQLOOKUPD_ADDR:-localhost:4161}
  metrics: { enabled: true }
  producer:
    topic: example-nsq
  consumer:
    topics: [example-nsq]
    group: example-channel
  nsq:
    nsqd_addr: ${env:NSQD_ADDR:-localhost:4150}
    channel: example-channel
    max_in_flight: 10
    msg_timeout: 60s
  trace:
    enabled: true
    service_name: nsqx-test
    exporter: ${env:MQ_TRACE_BACKEND:-jaeger}
    endpoint: ${env:JAEGER_ENDPOINT:-localhost:4317}
    protocol: grpc
    sampler_type: always_on
    sampler_ratio: 1.0
    stream: ${env:TRACE_REDIS_STREAM:-trace:nsqx:single}
    topic: ${env:TRACE_KAFKA_TOPIC:-trace-spans-nsqx}

nsq_cluster:
  driver: nsq
  mode: cluster
  addrs:
    - ${env:NSQLOOKUPD_ADDR_1:-localhost:4161}
    - ${env:NSQLOOKUPD_ADDR_2:-localhost:4261}
    - ${env:NSQLOOKUPD_ADDR_3:-localhost:4361}
  metrics: { enabled: true }
  producer:
    topic: example-nsq
  consumer:
    topics: [example-nsq]
    group: example-cluster-channel
  nsq:
    nsqd_addr: ${env:NSQD_ADDR:-localhost:4150}
    channel: example-cluster-channel
    max_in_flight: 10
    msg_timeout: 60s
  trace:
    enabled: true
    service_name: nsqx-test-cluster
    exporter: ${env:MQ_TRACE_BACKEND:-jaeger}
    endpoint: ${env:JAEGER_ENDPOINT:-localhost:4317}
    protocol: grpc
    sampler_type: always_on
    sampler_ratio: 1.0
    stream: ${env:TRACE_REDIS_STREAM:-trace:nsqx:cluster}
    topic: ${env:TRACE_KAFKA_TOPIC:-trace-spans-nsqx}