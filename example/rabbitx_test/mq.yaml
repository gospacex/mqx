# RabbitMQ 单机配置 (e2e)
# env-var 切换：MQ_TRACE_BACKEND 决定 trace backend；RABBITMQ_URL 默认 localhost。
rabbit_single:
  driver: rabbit
  mode: single
  addrs:
    - ${env:RABBITMQ_URL:-amqp://guest:guest@localhost:5672/}
  metrics: { enabled: true }
  producer:
    topic: example.exchange
  consumer:
    topics: [example.queue]
    group: example-tag
  rabbitmq:
    vhost: /
    exchange: example.exchange
    exchange_type: direct
    queue: example.queue
    routing_key: example.key
    durable: true
    prefetch: 10
    confirm: true
  trace:
    enabled: true
    service_name: rabbitx-test
    exporter: ${env:MQ_TRACE_BACKEND:-jaeger}
    endpoint: ${env:JAEGER_ENDPOINT:-localhost:4317}
    protocol: grpc
    sampler_type: always_on
    sampler_ratio: 1.0
    stream: ${env:TRACE_REDIS_STREAM:-trace:rabbitx:single}
    topic: ${env:TRACE_KAFKA_TOPIC:-trace-spans-rabbitx}

# RabbitMQ 3 节点集群配置 (e2e)
# env-var 切换：RABBITMQ_URL_{1,2,3} 默认映射本地 5672/5673/5674。
rabbit_cluster:
  driver: rabbit
  mode: cluster
  addrs:
    - ${env:RABBITMQ_URL_1:-amqp://guest:guest@localhost:5672/}
    - ${env:RABBITMQ_URL_2:-amqp://guest:guest@localhost:5673/}
    - ${env:RABBITMQ_URL_3:-amqp://guest:guest@localhost:5674/}
  metrics: { enabled: true }
  producer:
    topic: example.exchange
  consumer:
    topics: [example.queue]
    group: example-cluster-tag
  rabbitmq:
    vhost: /
    exchange: example.exchange
    exchange_type: direct
    queue: example.queue
    routing_key: example.key
    durable: true
    prefetch: 10
    confirm: true
  trace:
    enabled: true
    service_name: rabbitx-test-cluster
    exporter: ${env:MQ_TRACE_BACKEND:-jaeger}
    endpoint: ${env:JAEGER_ENDPOINT:-localhost:4317}
    protocol: grpc
    sampler_type: always_on
    sampler_ratio: 1.0
    stream: ${env:TRACE_REDIS_STREAM:-trace:rabbitx:cluster}
    topic: ${env:TRACE_KAFKA_TOPIC:-trace-spans-rabbitx}
